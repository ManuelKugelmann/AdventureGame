cards:
  - id: abbey_gate
    name: Abbey Gate
    biome: ruins
    tier: 1
    sections:
      - { id: gate_yard, row: entry, col: full, cover: open, chokepoint: 3 }
      - { id: cloister_wall, row: exit, col: left, cover: covered, chokepoint: 2, slots: [{ kind: mystery }] }
      - { id: postern, row: exit, col: right, cover: partial, chokepoint: 2 }
    sectionEdges:
      - { a: gate_yard, b: cloister_wall }
      - { a: gate_yard, b: postern }
    topExits:
      - { section: cloister_wall, side: left }
      - { section: postern, side: right }
    spawns: []

  - id: cloister_garden
    name: Cloister Garden
    biome: ruins
    tier: 1
    sections:
      - { id: garden, row: entry, col: full, cover: open, chokepoint: 3 }
      - { id: colonnade, row: exit, col: full, cover: covered, chokepoint: 2, slots: [{ kind: mystery }] }
    sectionEdges:
      - { a: garden, b: colonnade }
    topExits:
      - { section: colonnade, side: right }
    spawns:
      - { enemy: cultist, section: colonnade }

  - id: refectory
    name: Ruined Refectory
    biome: ruins
    tier: 1
    sections:
      - { id: hall, row: entry, col: full, cover: partial, chokepoint: 3, slots: [{ kind: mystery }] }
      - { id: kitchen, row: core, col: full, cover: covered, chokepoint: 2 }
      - { id: pantry, row: exit, col: full, cover: covered, chokepoint: 1, slots: [{ kind: mystery }] }
    sectionEdges:
      - { a: hall, b: kitchen }
      - { a: kitchen, b: pantry }
    topExits:
      - { section: pantry, side: left }
    spawns: []

  - id: chapel_ruin
    name: Chapel Ruin
    biome: ruins
    tier: 1
    sections:
      - { id: nave, row: entry, col: full, cover: open, chokepoint: 4 }
      - { id: altar, row: exit, col: right, cover: partial, chokepoint: 2, slots: [{ kind: mystery }] }
      - { id: vestry, row: exit, col: left, cover: covered, chokepoint: 2 }
    sectionEdges:
      - { a: nave, b: altar }
      - { a: nave, b: vestry }
      - { a: altar, b: vestry }
    topExits:
      - { section: altar, side: right }
      - { section: vestry, side: left }
    spawns:
      - { enemy: ghoul, section: nave }

  - id: collapsed_hall
    name: Collapsed Hall
    biome: ruins
    tier: 1
    sections:
      - { id: rubble, row: entry, col: full, cover: partial, chokepoint: 2 }
      - { id: gallery, row: exit, col: full, cover: partial, chokepoint: 2, slots: [{ kind: mystery }] }
    sectionEdges:
      - { a: rubble, b: gallery }
    topExits:
      - { section: gallery, side: right }
    spawns:
      - { enemy: stone_golem, section: gallery, sleeper: true }

  - id: old_well
    name: Old Well
    biome: ruins
    tier: 1
    sections:
      - { id: wellhead, row: entry, col: full, cover: open, chokepoint: 2, slots: [{ kind: mystery }] }
      - { id: cistern, row: exit, col: full, cover: covered, chokepoint: 1 }
    sectionEdges:
      - { a: wellhead, b: cistern }
    topExits:
      - { section: cistern, side: right }
    spawns: []

  - id: herb_garden
    name: Herb Garden
    biome: ruins
    tier: 1
    sections:
      - { id: beds, row: entry, col: full, cover: open, chokepoint: 3 }
      # a briar thicket: a cramped nook (capacity 1) that may conceal a lurking ghoul
      - { id: briar, row: core, col: left, cover: covered, chokepoint: 1, hiding: true, capacity: 1, ambush: { enemy: ghoul } }
      - { id: shed, row: exit, col: full, cover: covered, chokepoint: 1, slots: [{ kind: mystery }] }
    sectionEdges:
      - { a: beds, b: shed }
      - { a: beds, b: briar }
    topExits:
      - { section: shed, side: left }
    spawns: []

  - id: dormitory
    name: Dormitory
    biome: ruins
    tier: 1
    sections:
      - { id: corridor, row: entry, col: full, cover: partial, chokepoint: 2 }
      - { id: cells, row: core, col: full, cover: covered, chokepoint: 2, slots: [{ kind: mystery }] }
      - { id: stair, row: exit, col: full, cover: partial, chokepoint: 1 }
    sectionEdges:
      - { a: corridor, b: cells }
      - { a: corridor, b: stair }
    topExits:
      - { section: stair, side: right }
    spawns:
      - { enemy: cultist, section: corridor }

  # special card: an overpass — two side-by-side paths that do NOT connect inside
  # the card. Each entry reaches only its own span; the spans are joined only by a
  # `climb` barrier edge (no special-move ability exists in v0, so it stays uncrossable).
  - id: overpass
    name: Broken Overpass
    biome: ruins
    tier: 1
    sections:
      - { id: south_ramp, row: entry, col: left, cover: partial, chokepoint: 2 }
      - { id: north_ramp, row: entry, col: right, cover: partial, chokepoint: 2 }
      - { id: west_span, row: exit, col: left, cover: open, chokepoint: 3, slots: [{ kind: mystery }] }
      - { id: east_span, row: exit, col: right, cover: open, chokepoint: 3 }
    sectionEdges:
      - { a: south_ramp, b: west_span }
      - { a: north_ramp, b: east_span }
      - { a: west_span, b: east_span, requires: climb }
    topExits:
      - { section: west_span, side: left }
      - { section: east_span, side: right }
    spawns: []
